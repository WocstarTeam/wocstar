<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Companies | Wocstar Fund</title>
  <style>
    :root {
      --page-bg: #000;
      --text-main: rgba(255, 255, 255, 0.95);
      --text-muted: rgba(255, 255, 255, 0.82);
      --plate-bg: rgba(255, 255, 255, 0.08);
      --plate-border: rgba(255, 255, 255, 0.24);
      --motion: 180ms ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text-main);
    }

    .brand {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      line-height: 1;
      text-decoration: none;
      display: inline-block;
    }

    .brand-logo {
      display: block;
      height: 42px;
      width: auto;
      max-width: 100%;
    }

    .page {
      width: min(1320px, calc(100vw - 72px));
      margin: 0 auto;
      padding: clamp(116px, 14vh, 160px) 0 clamp(44px, 8vh, 88px);
      background:
        radial-gradient(circle at 84% 14%, rgba(95, 157, 255, 0.18), transparent 44%),
        radial-gradient(circle at 8% 92%, rgba(231, 195, 127, 0.12), transparent 38%);
    }

    .header {
      max-width: 880px;
      margin-bottom: clamp(34px, 7vh, 74px);
    }

    .title {
      font-size: clamp(30px, 5.6vw, 76px);
      line-height: 0.98;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .description {
      margin-top: 18px;
      max-width: 700px;
      font-size: clamp(14px, 1.18vw, 20px);
      line-height: 1.5;
      color: var(--text-muted);
    }

    .company-grid {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: clamp(22px, 2.8vw, 40px) clamp(18px, 2.2vw, 30px);
      align-items: start;
    }

    .company-link {
      display: block;
      text-decoration: none;
      color: inherit;
      transition: transform var(--motion), opacity var(--motion);
    }

    .company-link:hover,
    .company-link:focus-visible {
      transform: scale(1.015);
      opacity: 0.9;
      outline: none;
    }

    .logo-plate {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--plate-bg);
      border: 1px solid var(--plate-border);
      border-radius: 6px;
      padding: clamp(16px, 1.9vw, 24px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark {
      font-size: clamp(13px, 0.92vw, 16px);
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.94);
      text-align: center;
      line-height: 1.1;
    }

    .logo-image {
      width: min(100%, 180px);
      height: auto;
      max-height: 78px;
      object-fit: contain;
      display: block;
    }

    .company-name {
      margin-top: 12px;
      font-size: clamp(15px, 1vw, 18px);
      line-height: 1.3;
      font-weight: 500;
      color: var(--text-main);
    }

    @media (max-width: 1300px) {
      .company-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 1024px) {
      .brand {
        top: 18px;
        left: 18px;
      }

      .brand-logo {
        height: 36px;
      }

      .page {
        width: calc(100vw - 48px);
        padding-top: 98px;
      }

      .company-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .company-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .page {
        width: calc(100vw - 28px);
      }

      .company-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a class="brand" href="index.html" aria-label="Go to Wocstar Fund home">
    <img class="brand-logo" src="Wocstar logos/wocstar-fund-logo.png" alt="Wocstar Fund" />
  </a>

  <main class="page">
    <header class="header">
      <h1 class="title">Portfolio Companies</h1>
      <p class="description">
        Working together with Founders to move the world forward
      </p>
    </header>

    <ul class="company-grid" aria-label="Portfolio company list">
      <li>
        <a class="company-link" href="#" aria-label="Open Samba TV profile">
          <div class="logo-plate"><img class="logo-image" src="portco logo/sambatvlogo.png" alt="Samba TV logo" /></div>
          <p class="company-name">Samba TV</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open Hemster profile">
          <div class="logo-plate"><img class="logo-image" src="portco logo/hemster.jpg" alt="Hemster logo" /></div>
          <p class="company-name">Hemster</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open Re-Nuble profile">
          <div class="logo-plate"><img class="logo-image" src="portco logo/renuble.png" alt="Re-Nuble logo" /></div>
          <p class="company-name">Re-Nuble</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open FilmHedge profile">
          <div class="logo-plate"><img class="logo-image" src="portco logo/filmhedge.jpg" alt="FilmHedge logo" /></div>
          <p class="company-name">FilmHedge</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open Infinite Object profile">
          <div class="logo-plate"><span class="logo-mark">Infinite Object</span></div>
          <p class="company-name">Infinite Object</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open Possip profile">
          <div class="logo-plate"><span class="logo-mark">Possip</span></div>
          <p class="company-name">Possip</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open Uncharted profile">
          <div class="logo-plate"><span class="logo-mark">Uncharted</span></div>
          <p class="company-name">Uncharted</p>
        </a>
      </li>
      <li>
        <a class="company-link" href="#" aria-label="Open Moment.ai profile">
          <div class="logo-plate"><span class="logo-mark">Moment.ai</span></div>
          <p class="company-name">Moment.ai</p>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
